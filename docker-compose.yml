version: '3.8'

services:
  # ═══════════════════════════════════════════════════
  # PostgreSQL Database
  # ═══════════════════════════════════════════════════
  database:
    image: postgres:16-alpine
    container_name: prism_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-prism_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prism_network

  # ═══════════════════════════════════════════════════
  # Redis (Optional - for caching)
  # ═══════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: prism_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prism_network

  # ═══════════════════════════════════════════════════
  # Backend API
  # ═══════════════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prism_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@database:5432/${DB_NAME:-prism_db}
      CORS_ORIGIN: http://localhost:3000
      ML_SERVICE_URL: http://failure_engine:8000
      ML_SERVICE_TIMEOUT: 10000
      ML_SERVICE_RETRIES: 3
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    ports:
      - "3001:3001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prism_network

  # ═══════════════════════════════════════════════════
  # Frontend UI
  # ═══════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prism_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:3001/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "3000:3000"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prism_network

  # ═══════════════════════════════════════════════════
  # Prometheus Monitoring
  # ═══════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: prism_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - prism_network

  # ═══════════════════════════════════════════════════
  # Grafana Dashboard
  # ═══════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: prism_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: 'grafana-clock-panel'
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    networks:
      - prism_network

  # ═══════════════════════════════════════════════════
  # Multimodal Failure Intelligence Engine (ML API)
  # ═══════════════════════════════════════════════════
  failure_engine:
    build:
      context: ./ml_engine
      dockerfile: Dockerfile
    container_name: prism_failure_engine
    ports:
      - "8000:8000"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/docs']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prism_network

networks:
  prism_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
